<div class="container mt-5">

  <div class="text-center mb-5">
    <h2 class="fw-bold">📩 Contact Us</h2>
    <p class="text-muted">Have questions about courses or placements? We'd love to hear from you.</p>
  </div>

  <div class="row g-4">

    <!-- Contact Info -->
    <div class="col-md-5">
      <div class="card contact-card border-0 shadow-sm h-100">
        <div class="card-body">

          <h5 class="fw-bold mb-3">Get in Touch</h5>

          <p class="text-muted">
            If you have questions about our courses, placements, or team,
            feel free to contact us anytime.
          </p>

          <p class="contact-item">
            📧 <strong>Email:</strong> support@codematters.com
          </p>

          <p class="contact-item">
            📞 <strong>Phone:</strong> +91 9876543210
          </p>

          <p class="contact-item">
            📍 <strong>Location:</strong> CodeMatters Training Institute
          </p>

        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="col-md-7">
      <div class="card contact-card border-0 shadow-sm">
        <div class="card-body">

          <form>

            <div class="mb-3">
              <input type="text" class="form-control form-input" placeholder="Your Name">
            </div>

            <div class="mb-3">
              <input type="email" class="form-control form-input" placeholder="Your Email">
            </div>

            <div class="mb-3">
              <textarea class="form-control form-input" rows="4" placeholder="Your Message"></textarea>
            </div>

            <button class="btn btn-primary w-100">
              Send Message →
            </button>

          </form>

        </div>
      </div>
    </div>

  </div>

</div>
